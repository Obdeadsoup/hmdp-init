server:
  port: 8081
spring:
  application:
    name: hmdp
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${HMDP_DB_HOST:127.0.0.1}:${HMDP_DB_PORT:3306}/${HMDP_DB_NAME:hmdp}?useSSL=false&serverTimezone=UTC
    username: ${HMDP_DB_USERNAME:root}
    password: ${HMDP_DB_PASSWORD:}
  redis:
    host: ${HMDP_REDIS_HOST:localhost}
    port: ${HMDP_REDIS_PORT:6379}
    password: ${HMDP_REDIS_PASSWORD:}
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
mybatis-plus:
  type-aliases-package: com.hmdp.entity # 别名扫描包
logging:
  level:
    com.hmdp: debug
