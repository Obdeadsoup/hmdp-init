spring:
  application:
    name: hmdp-test

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

    url: jdbc:mysql://${HMDP_TEST_DB_HOST:127.0.0.1}:${HMDP_TEST_DB_PORT:3308}/${HMDP_TEST_DB_NAME:hmdp}?useSSL=false&serverTimezone=UTC&characterEncoding=utf8

    username: ${HMDP_TEST_DB_USERNAME:hmdp_test}
    password: ${HMDP_TEST_DB_PASSWORD:hmdp_test_password}

  redis:
    host: ${HMDP_TEST_REDIS_HOST:127.0.0.1}
    port: ${HMDP_TEST_REDIS_PORT:6380}
    password: ${HMDP_TEST_REDIS_PASSWORD:}
    database: 0

    lettuce:
      pool:
        max-active: 5
        max-idle: 5
        min-idle: 1

  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  type-aliases-package: com.hmdp.entity

logging:
  level:
    com.hmdp.mapper: debug

hmdp:
  seckill:
    consumer:
      enabled: false