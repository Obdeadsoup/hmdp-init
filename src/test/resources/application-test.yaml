# 测试环境配置。
# Maven/Spring Boot 会自动将 src/test/resources 加入测试运行时 classpath，
# 配合 @ActiveProfiles("test") 使用本文件。
spring:
  application:
    name: hmdp-test

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 建议通过 HMDP_TEST_DB_* 指向独立的测试库；当前默认 hmdp 是为了让现有测试可直接启动。
    url: jdbc:mysql://${HMDP_TEST_DB_HOST:127.0.0.1}:${HMDP_TEST_DB_PORT:3306}/${HMDP_TEST_DB_NAME:hmdp}?useSSL=false&serverTimezone=UTC
    username: ${HMDP_TEST_DB_USERNAME:root}
    password: ${HMDP_TEST_DB_PASSWORD:123456}

  redis:
    # Docker Redis 通过 -p 127.0.0.1:6379:6379 发布到宿主机；
    # 显式使用 IPv4，避免 localhost 在不同 JVM 中解析到不同地址族。
    host: ${HMDP_TEST_REDIS_HOST:127.0.0.1}
    port: ${HMDP_TEST_REDIS_PORT:6379}
    password: ${HMDP_TEST_REDIS_PASSWORD:}
    # GEO 初始化需要让正在运行的项目也能读取结果，因此写入 Docker Redis 的 0 号逻辑库。
    database: ${HMDP_TEST_REDIS_DATABASE:0}
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s

  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  type-aliases-package: com.hmdp.entity

logging:
  level:
    com.hmdp.mapper: debug
